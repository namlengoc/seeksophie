services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3100}:3000"
    depends_on:
      - backend
    networks:
      - seeksophie

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8800}:8000"
    volumes:
      - ./backend/.env:/var/www/html/.env:ro
      - backend_storage:/var/www/html/storage/app
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - AI_SERVICE_URL=http://ai-service:8001
      - DB_USERNAME=${POSTGRES_USER:-seeksophie}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - seeksophie

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: php artisan queue:work redis --queue=high,ai-processing,default --tries=3 --timeout=300
    restart: unless-stopped
    volumes:
      - ./backend/.env:/var/www/html/.env:ro
      - backend_storage:/var/www/html/storage/app
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - AI_SERVICE_URL=http://ai-service:8001
      - DB_USERNAME=${POSTGRES_USER:-seeksophie}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - seeksophie

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
    depends_on:
      - backend
    networks:
      - seeksophie

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seeksophie_ai}
      POSTGRES_USER: ${POSTGRES_USER:-seeksophie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seeksophie} -d ${POSTGRES_DB:-seeksophie_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seeksophie

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in root .env}
    command: >
      sh -c 'exec redis-server --save 60 1 --loglevel notice --requirepass "$$REDIS_PASSWORD"'
    networks:
      - seeksophie

networks:
  seeksophie:
    driver: bridge

volumes:
  pgdata:
  backend_storage:
